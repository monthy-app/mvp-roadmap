name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: |
          python3 - <<'PY'
          import sys, pathlib
          text = pathlib.Path("skills/mvp-roadmap/SKILL.md").read_text(encoding="utf-8")
          if not text.startswith("---\n"):
              sys.exit("SKILL.md: missing opening '---' frontmatter fence")
          end = text.find("\n---", 4)
          if end == -1:
              sys.exit("SKILL.md: missing closing '---' frontmatter fence")
          keys = [
              line.split(":", 1)[0].strip()
              for line in text[4:end].splitlines()
              if ":" in line and not line[:1].isspace()
          ]
          for required in ("name", "description"):
              if required not in keys:
                  sys.exit(f"SKILL.md frontmatter: missing required key '{required}'")
          print("SKILL.md frontmatter OK:", ", ".join(keys))
          PY

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2@0.23.0 "**/*.md"

      - name: Check living docs (self-hosting gate)
        run: bash scripts/check-doc.sh ROADMAP.md docs/plans/*.md
