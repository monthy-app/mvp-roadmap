name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter (all skills)
        run: |
          python3 - <<'PY'
          import sys, pathlib
          paths = sorted(pathlib.Path("skills").glob("*/SKILL.md"))
          if not paths:
              sys.exit("no skills/*/SKILL.md found")
          for p in paths:
              text = p.read_text(encoding="utf-8")
              if not text.startswith("---\n"):
                  sys.exit(f"{p}: missing opening '---' frontmatter fence")
              end = text.find("\n---", 4)
              if end == -1:
                  sys.exit(f"{p}: missing closing '---' frontmatter fence")
              fields = {}
              for line in text[4:end].splitlines():
                  if ":" in line and not line[:1].isspace():
                      k, _, v = line.partition(":")
                      fields[k.strip()] = v.strip()
              for required in ("name", "description"):
                  if required not in fields:
                      sys.exit(f"{p}: frontmatter missing required key '{required}'")
              if fields["name"] != p.parent.name:
                  sys.exit(f"{p}: name '{fields['name']}' != directory '{p.parent.name}'")
              print(f"{p} OK: {', '.join(fields)}")
          PY

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2@0.23.0 "**/*.md"

      - name: Check living docs (self-hosting gate)
        run: bash scripts/check-doc.sh ROADMAP.md docs/plans/*.md
